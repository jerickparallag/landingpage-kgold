<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="KGOLD Beauty Essentials — Filipino-crafted beauty essentials built on quality formulations, trusted partnerships, and purposeful care."
    />
    <link rel="canonical" href="https://kgoldbeauty.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KGOLD Beauty Essentials" />
    <meta
      property="og:description"
      content="Beauty essentials, crafted with purpose. Discover our story, brands, and commitment to quality."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://kgoldbeauty.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KGOLD Beauty Essentials" />
    <meta
      name="twitter:description"
      content="Beauty essentials, crafted with purpose. Discover our story, brands, and commitment to quality."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <title>KGOLD Beauty Essentials</title>
    <script>
      try {
        var t = localStorage.getItem('kgold-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
